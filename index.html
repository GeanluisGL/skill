<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Geanluis Lorenzo | Skills & Competencias</title>
    
    <!-- Google Fonts + Icon Libraries -->
    <link rel="stylesheet" href="Css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="https://img.icons8.com/material/24/under-computer--v1.png" type="image/x-icon">
    
    <style>
        /* Estilos para el botón de idioma (mismo estilo que theme-toggle) */
        .lang-toggle {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, transform 0.2s;
            font-weight: 600;
            background-color: var(--bg-secondary, #f0f0f0);
            color: var(--text-primary, #333);
            margin-left: 0.5rem;
        }
        .lang-toggle:hover {
            transform: scale(1.05);
            background-color: var(--accent-color, #0a66c2);
            color: white;
        }
        [data-theme="dark"] .lang-toggle {
            background-color: var(--bg-secondary, #2d2d2d);
            color: var(--text-primary, #eee);
        }
        [data-theme="dark"] .lang-toggle:hover {
            background-color: var(--accent-color, #0a66c2);
        }
        @media (max-width: 768px) {
            .lang-toggle {
                width: 35px;
                height: 35px;
                font-size: 1rem;
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <a href="https://geanluisgl.github.io/gy/" class="logo" data-i18n="logo">Portfolio</a>
    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="https://geanluisgl.github.io/gy/" data-i18n="nav_home">Home</a></li>
            <li><a href="https://geanluisgl.github.io/about/" data-i18n="nav_about">About</a></li>
            <li><a href="https://geanluisgl.github.io/skill/" class="active" data-i18n="nav_skills">Skills</a></li>
            <li><a href="https://geanluisgl.github.io/project/" data-i18n="nav_projects">Projects</a></li>
            <li><a href="https://geanluisgl.github.io/contact/" data-i18n="nav_contact">Contact</a></li>
        </ul>
        <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">
            <i class='bx bx-moon'></i>
        </button>
        <button class="lang-toggle" id="langToggle" aria-label="Cambiar idioma">ES</button>
        <button class="nav-toggle" id="navToggle" aria-label="Abrir menú">
            <i class='bx bx-menu'></i>
        </button>
    </nav>
</header>

<section class="in-flex">
    <!-- Tarjeta: Desarrollo de Software -->
    <div class="flexSkill">
        <h1 data-i18n="skill_software_title">Software Development</h1>
        <hr>
        <div class="skills-grid">
            <div class="skill-item"><i class='bx bxl-java'></i><span class="skill-label" data-i18n="skill_java">Java</span></div>
            <div class="skill-item"><i class='bx bxl-php'></i><span class="skill-label" data-i18n="skill_php">PHP</span></div>
            <div class="skill-item"><i class='bx bxl-javascript'></i><span class="skill-label" data-i18n="skill_js">JavaScript</span></div>
            <div class="skill-item"><i class='bx bxs-data'></i><span class="skill-label" data-i18n="skill_sql">SQL Server</span></div>
            <div class="skill-item"><i class="devicon-csharp-plain"></i><span class="skill-label" data-i18n="skill_csharp">C#</span></div>
        </div>
    </div>

    <!-- Tarjeta: Conocimientos & Herramientas -->
    <div class="flexSkill">
        <h1 data-i18n="skill_tools_title">Knowledge & Tools</h1>
        <hr>
        <div class="skills-grid">
            <div class="skill-item"><i class="fa-solid fa-house-laptop"></i><span class="skill-label" data-i18n="skill_remote">Remote Work</span></div>
            <div class="skill-item"><i class="fa-solid fa-laptop-file"></i><span class="skill-label" data-i18n="skill_dataentry">Data Entry</span></div>
            <div class="skill-item"><i class='bx bx-edit-alt'></i><span class="skill-label" data-i18n="skill_writing">Writing</span></div>
            <div class="skill-item"><i class='bx bxl-microsoft'></i><span class="skill-label" data-i18n="skill_m365">Microsoft 365</span></div>
            <div class="skill-item"><i class='bx bx-laptop'></i><span class="skill-label" data-i18n="skill_frontend">Frontend</span></div>
            <div class="skill-item"><i class='bx bx-server'></i><span class="skill-label" data-i18n="skill_backend">Backend</span></div>
        </div>
    </div>

    <!-- Tarjeta: Habilidades Blandas -->
    <div class="flexSkill">
        <h1 data-i18n="skill_soft_title">Soft Skills</h1>
        <hr>
        <div class="skills-grid">
            <div class="skill-item"><i class='bx bxs-select-multiple'></i><span class="skill-label" data-i18n="skill_multitasking">Multitasking</span></div>
            <div class="skill-item"><i class='bx bx-message-dots'></i><span class="skill-label" data-i18n="skill_communication">Communication</span></div>
            <div class="skill-item"><i class="fa-solid fa-sitemap"></i><span class="skill-label" data-i18n="skill_organization">Organization</span></div>
            <div class="skill-item"><i class="fa-solid fa-people-group"></i><span class="skill-label" data-i18n="skill_teamwork">Teamwork</span></div>
            <div class="skill-item"><i class='bx bxs-brain'></i><span class="skill-label" data-i18n="skill_analysis">Analysis & Learning</span></div>
        </div>
    </div>
</section>

<script>
    // ========== TRADUCCIONES ==========
    const translations = {
        en: {
            title: "Geanluis Lorenzo | Skills & Competencies",
            logo: "Portfolio",
            nav_home: "Home",
            nav_about: "About",
            nav_skills: "Skills",
            nav_projects: "Projects",
            nav_contact: "Contact",
            skill_software_title: "Software Development",
            skill_java: "Java",
            skill_php: "PHP",
            skill_js: "JavaScript",
            skill_sql: "SQL Server",
            skill_csharp: "C#",
            skill_tools_title: "Knowledge & Tools",
            skill_remote: "Remote Work",
            skill_dataentry: "Data Entry",
            skill_writing: "Writing",
            skill_m365: "Microsoft 365",
            skill_frontend: "Frontend",
            skill_backend: "Backend",
            skill_soft_title: "Soft Skills",
            skill_multitasking: "Multitasking",
            skill_communication: "Communication",
            skill_organization: "Organization",
            skill_teamwork: "Teamwork",
            skill_analysis: "Analysis & Learning"
        },
        es: {
            title: "Geanluis Lorenzo | Habilidades y Competencias",
            logo: "Portafolio",
            nav_home: "Inicio",
            nav_about: "Acerca de",
            nav_skills: "Habilidades",
            nav_projects: "Proyectos",
            nav_contact: "Contacto",
            skill_software_title: "Desarrollo de Software",
            skill_java: "Java",
            skill_php: "PHP",
            skill_js: "JavaScript",
            skill_sql: "SQL Server",
            skill_csharp: "C#",
            skill_tools_title: "Conocimientos y Herramientas",
            skill_remote: "Trabajo Remoto",
            skill_dataentry: "Ingreso de Datos",
            skill_writing: "Redacción",
            skill_m365: "Microsoft 365",
            skill_frontend: "Frontend",
            skill_backend: "Backend",
            skill_soft_title: "Habilidades Blandas",
            skill_multitasking: "Multitarea",
            skill_communication: "Comunicación",
            skill_organization: "Organización",
            skill_teamwork: "Trabajo en Equipo",
            skill_analysis: "Análisis y Aprendizaje"
        }
    };

    let currentLang = 'en';

    function setLanguage(lang) {
        if (!translations[lang]) return;
        currentLang = lang;
        
        // Actualizar elementos con data-i18n
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang][key]) {
                if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                    el.value = translations[lang][key];
                } else {
                    el.innerText = translations[lang][key];
                }
            }
        });
        
        // Cambiar título de la página
        document.title = translations[lang].title;
        
        // Actualizar texto del botón de idioma
        const langToggle = document.getElementById('langToggle');
        if (langToggle) {
            langToggle.innerText = lang === 'en' ? 'ES' : 'EN';
        }
        
        localStorage.setItem('preferredLang', lang);
    }

    function toggleLanguage() {
        const newLang = currentLang === 'en' ? 'es' : 'en';
        setLanguage(newLang);
    }

    // ==========  MENÚ HAMBURGUESA MEJORADO ==========
    const navToggle = document.getElementById('navToggle');
    const navLinks = document.querySelector('.nav-links');

    if (navToggle && navLinks) {
        navToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            navLinks.classList.toggle('active');
        });

        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        document.addEventListener('click', (event) => {
            if (!navToggle.contains(event.target) && !navLinks.contains(event.target)) {
                navLinks.classList.remove('active');
            }
        });
    }

    // ==========  MODO OSCURO / CLARO con persistencia ==========
    const themeToggleBtn = document.getElementById('themeToggle');
    const htmlElement = document.documentElement;
    
    const savedTheme = localStorage.getItem('theme') || 'light';
    htmlElement.setAttribute('data-theme', savedTheme);
    
    function updateThemeIcon(theme) {
        const iconElement = themeToggleBtn.querySelector('i');
        if (theme === 'dark') {
            iconElement.className = 'bx bx-sun';
        } else {
            iconElement.className = 'bx bx-moon';
        }
    }
    
    updateThemeIcon(savedTheme);
    
    themeToggleBtn.addEventListener('click', () => {
        const currentTheme = htmlElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        htmlElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme);
    });

    window.addEventListener('resize', () => {
        if (window.innerWidth > 768 && navLinks.classList.contains('active')) {
            navLinks.classList.remove('active');
        }
    });

    // ========== INICIALIZAR IDIOMA ==========
    const savedLang = localStorage.getItem('preferredLang');
    if (savedLang && translations[savedLang]) {
        setLanguage(savedLang);
    } else {
        const browserLang = navigator.language.split('-')[0];
        setLanguage(browserLang === 'es' ? 'es' : 'en');
    }

    const langToggleBtn = document.getElementById('langToggle');
    if (langToggleBtn) langToggleBtn.addEventListener('click', toggleLanguage);
</script>
</body>
</html>
