<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geanluis Lorenzo | Skills</title>
    <link rel="stylesheet" href="Css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="icon" href="https://img.icons8.com/material/24/under-computer--v1.png" type="image/x-icon"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <a href="https://geanluisgl.github.io/gy/" class="logo">Portfolio</a>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="https://geanluisgl.github.io/gy/">Home</a></li>
                <li><a href="https://geanluisgl.github.io/about/">About</a></li>
                <li><a href="https://geanluisgl.github.io/skill/" class="active">Skills</a></li>
                <li><a href="https://geanluisgl.github.io/project/">Projects</a></li>
                <li><a href="https://geanluisgl.github.io/contact/">Contact</a></li>
            </ul>
            <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">
                <i class='bx bx-moon'></i>
            </button>
            <button class="nav-toggle" aria-label="Abrir menú">
                <i class='bx bx-menu' style="font-size: 2rem;"></i>
            </button>
        </nav>
    </header>

    <section class="in-flex">
        <div class="flexSkill">
            <h1>Software Development</h1>
            <hr>
            <div>
                <i class='bx bxl-java' title="Java"></i>
                <i class='bx bxl-php' title="PHP"></i>
                <i class='bx bxl-javascript' title="JavaScript"></i>
                <i class='bx bxs-data' title="SQL Server"></i>
                <i class="devicon-csharp-plain" title="C#"></i>
            </div>
        </div>

        <div class="flexSkill">
            <h1>Knowledge & Tools</h1>
            <hr>
            <div>
                <i class="fa-solid fa-house-laptop" title="Remote Work"></i>
                <i class="fa-solid fa-laptop-file" title="Data Entry"></i>
                <i class='bx bx-edit-alt' title="Writing"></i>
                <i class='bx bxl-microsoft' title="Microsoft Office"></i>
                <i class='bx bx-laptop' title="Frontend"></i>
                <i class='bx bx-server' title="Backend"></i>
            </div>
        </div>

        <div class="flexSkill">
            <h1>Soft Skills</h1>
            <hr>
            <div>
                <i class='bx bxs-select-multiple' title="Multitasking"></i>
                <i class='bx bx-message-dots' title="Communication"></i>
                <i class="fa-solid fa-sitemap" title="Organization"></i>
                <i class="fa-solid fa-people-group" title="Teamwork"></i>
                <i class='bx bxs-brain' title="Analysis & Quick Learning"></i>
            </div>
        </div>
    </section>

    <script>
        // Menú hamburguesa
        const navToggle = document.querySelector('.nav-toggle');
        const navLinks = document.querySelector('.nav-links');

        navToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // Cerrar menú al hacer click en un enlace
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        // Modo nocturno/diurno
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;
        
        const savedTheme = localStorage.getItem('theme') || 'light';
        htmlElement.setAttribute('data-theme', savedTheme);
        
        function updateThemeIcon(theme) {
            const icon = themeToggle.querySelector('i');
            icon.className = theme === 'dark' ? 'bx bx-sun' : 'bx bx-moon';
        }
        
        updateThemeIcon(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });
    </script>
</body>
</html>
